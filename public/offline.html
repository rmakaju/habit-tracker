<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - Habit Tracker</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f4ee;
        color: #3f3b37;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }
      .card {
        background: #ffffff;
        border-radius: 16px;
        padding: 32px;
        max-width: 360px;
        box-shadow: 0 12px 32px rgba(61, 55, 49, 0.12);
      }
      h1 {
        font-size: 20px;
        margin: 0 0 12px;
      }
      p {
        margin: 0;
        color: #6b635e;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Reconnect to the internet to sync your habits.</p>
    </div>
  </body>
</html>
